<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Website -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Website Title -->
    <title>Dynamic Task Manager</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- Main Container -->
    <!-- ===================================== -->

    <div class="container">

        <!-- Main Heading -->
        <h1>📝 Dynamic Task Manager</h1>

        <!-- Input Section -->
        <div class="input-section">

            <!-- User enters task -->
            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task">

            <!-- Add Task Button -->
            <button id="addTask">
                Add Task
            </button>

        </div>

        <!-- Task List -->
        <ul id="taskList">

        </ul>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
