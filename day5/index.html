<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 5 - CSS Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Day 5 - CSS Flexbox</h1>

    <!-- Display Flex -->
    <section>
        <h2>display: flex</h2>
        <div class="container display-flex">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </section>

    <!-- Flex Direction -->
    <section>
        <h2>flex-direction</h2>
        <div class="container flex-direction">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </div>
    </section>

    <!-- Justify Content -->
    <section>
        <h2>justify-content</h2>
        <div class="container justify-content">
            <div class="box">A</div>
            <div class="box">B</div>
            <div class="box">C</div>
        </div>
    </section>

    <!-- Align Items -->
    <section>
        <h2>align-items</h2>
        <div class="container align-items">
            <div class="box">1</div>
            <div class="box big">2</div>
            <div class="box">3</div>
        </div>
    </section>

    <!-- Flex Wrap -->
    <section>
        <h2>flex-wrap</h2>
        <div class="container flex-wrap">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
    </section>

    <!-- Gap -->
    <section>
        <h2>gap</h2>
        <div class="container gap-demo">
            <div class="box">A</div>
            <div class="box">B</div>
            <div class="box">C</div>
        </div>
    </section>

    <!-- Flex Grow -->
    <section>
        <h2>flex-grow</h2>
        <div class="container grow-demo">
            <div class="box">1</div>
            <div class="box grow">2</div>
            <div class="box">3</div>
        </div>
    </section>

    <!-- Flex Shrink -->
    <section>
        <h2>flex-shrink</h2>
        <div class="container shrink-demo">
            <div class="box no-shrink">No Shrink</div>
            <div class="box">Shrink</div>
            <div class="box">Shrink</div>
        </div>
    </section>

    <!-- Order -->
    <section>
        <h2>order</h2>
        <div class="container order-demo">
            <div class="box order3">1</div>
            <div class="box order1">2</div>
            <div class="box order2">3</div>
        </div>
    </section>

</body>
</html>
